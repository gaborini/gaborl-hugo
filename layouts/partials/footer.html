<style>
  .footer {
    width: 100%;
    text-align: center;
    line-height: 1.7;
    margin: 2.5rem 0 2rem;
    font-size: 1rem;
    color: #64748b;
    border-top: 1px solid #1f2937;
    padding-top: 1.8rem;
  }
  .site-disclaimer {
    font-size: 0.78rem;
    line-height: 1.5;
    margin: 0.3rem 0;
    opacity: 0.75;
  }
  .footer a {
    color: #94a3b8;
  }
</style>
<footer class="footer">
  <section class="container">
    &copy; {{ now.Year }} <b style="color:#cbd5e1;">{{ .Site.Params.author }}</b>

    <p class="site-disclaimer">
      {{ with .Site.Params.social }}
        {{ $len := sub (len .) 1 }}
        {{ range $i, $e := sort . }}
          <a href="{{ $e.url }}" target="_blank">{{ $e.name }}</a>{{ if lt $i $len }} &nbsp;·&nbsp; {{ end }}
        {{ end }}
      {{ end }}
    </p>
    <p class="site-disclaimer">
      Built with Hugo • Dark lab edition<br>
      No trackers • No ads • No paywall
    </p>
  </section>
</footer>
