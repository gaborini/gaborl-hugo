<section class="container">
  <article class="blogpost">
    <header style="margin-bottom: 2rem;">
      <h1 class="title">{{ .Title }}</h1>
      <div style="color: vars.$color-muted; font-size: 0.9rem;">
        {{ .Date.Format "January 2, 2006" }}
      </div>
      {{ with .GetTerms "categories" }}
        <div style="margin-top: 0.4rem; font-size: 0.82rem; color: vars.$color-muted;">
          {{ range . }}<a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a>{{ end }}
        </div>
      {{ end }}
    </header>

    <div class="post-content">
      {{ .Content }}
    </div>

    <hr class="endofpost" />

    <p style="margin-top: 2rem; text-align: center; font-size: 0.9rem; color: vars.$color-muted;">
      <a href="/blog/index.xml" target="_blank">RSS</a> &nbsp;·&nbsp; <a href="/contact/">Feedback?</a>
    </p>
  </article>
</section>
