{{ define "content" }}
<div class="container" style="max-width: 780px; padding-top: 2rem;">

  <!-- Hero -->
  <div style="margin-bottom: 4rem;">
    <h1 style="font-size: 2.8rem; margin-bottom: 0.3rem; font-weight: 700;">{{ .Site.Params.author }}</h1>
    <p style="font-size: 1.3rem; color: #6b665c; max-width: 520px;">
      {{ .Site.Params.info }}
    </p>

    <!-- Graphic icons -->
    <div style="margin-top: 1.4rem; display: flex; gap: 0.8rem;">
      <div class="tech-icon">Arduino</div>
      <div class="tech-icon">RPi</div>
      <div class="tech-icon">Rust</div>
      <div class="tech-icon">Edge</div>
    </div>
  </div>

  <!-- Recent -->
  <div style="margin-bottom: 2.5rem;">
    <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.8rem;">
      <div style="font-size: 0.8rem; color: #6b665c; text-transform: uppercase; letter-spacing: 0.05em;">Recent notes</div>
      <a href="/blog/" style="font-size: 0.9rem;">all →</a>
    </div>

    <div class="recent-list">
      {{ range first 7 (where .Site.RegularPages "Type" "blog") }}
        <a href="{{ .RelPermalink }}" class="recent-item">
          <span class="date">{{ .Date.Format "2006-01-02" }}</span>
          <span class="title">{{ .Title }}</span>
        </a>
      {{ end }}
    </div>
  </div>

  <div style="font-size: 0.95rem;">
    <a href="/about/">About</a> &nbsp;·&nbsp; 
    <a href="/projects/">Projects</a> &nbsp;·&nbsp; 
    <a href="/learning/">Learning</a> &nbsp;·&nbsp; 
    <a href="/contact/">Contact</a>
  </div>

</div>
{{ end }}
