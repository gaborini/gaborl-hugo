<section class="container list">
  <h1 class="title">{{ .Title }}</h1>

  <ul>
    {{ range .Pages }}
      <li style="display: flex; gap: 1.4rem; padding: 0.7rem 0; border-top: 1px solid #1f2937;">
        <span style="width: 92px; flex-shrink: 0; color: #64748b; font-size: 0.9rem;">{{ .Date.Format "2006-01-02" }}</span>
        <a href="{{ .Permalink }}" style="color: #e2e8f0;">{{ .Title }}</a>
      </li>
    {{ end }}
  </ul>

  <p style="margin-top: 2.5rem; color: #64748b; font-size: 0.9rem;">
    <a href="/blog/index.xml" target="_blank">RSS feed</a>
  </p>
</section>
