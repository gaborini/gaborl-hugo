<section class="container page">
  <div style="max-width: 860px; margin: 0 auto;">
    <header style="margin-bottom: 2.4rem;">
      <div style="display: inline-block; padding: 0.25rem 0.9rem; background: #121826; border: 1px solid #2a3346; border-radius: 999px; font-size: 0.75rem; margin-bottom: 0.8rem; color: #94a3b8;">Gabor's Lab</div>
      <h1 style="margin: 0 0 0.6rem;">{{ .Title }}</h1>
      <div style="height: 3px; width: 56px; background: linear-gradient(to right, #fb923c, #22d3ee); border-radius: 3px;"></div>
    </header>

    <div class="page-content">
      {{ .Content }}
    </div>
  </div>
</section>
