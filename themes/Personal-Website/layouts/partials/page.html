<section class="container page">
  <article style="max-width: 820px; margin: 0 auto;">
    <header style="margin-bottom: 1.6rem;">
      <h1 style="margin-bottom: 0.4rem;">{{ .Title }}</h1>
      <div style="height: 3px; width: 48px; background: linear-gradient(to right, #fb923c, #22d3ee); border-radius: 3px;"></div>
    </header>

    <div class="page-content">
      {{ .Content }}
    </div>
  </article>
</section>
